name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: zig version
        run: zig version
      - name: zig build test
        run: zig build test --summary all
      - name: zig build dsr-demo
        run: zig build dsr-demo
